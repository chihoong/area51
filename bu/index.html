<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-grey: #9e9e9e;
      --color-dark-grey: #cbcbcb;
      --color-black: #000;
      --color-white: #fff;
      --color-blue: #344dbb;
      --color-green: #59e7ca;
      --color-dark: #121212;
      --color-surface: #1a1a1a;
      --color-border: #2a2a2a;
      --font-main: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      border: 0 solid;
    }

    html, body {
      background: var(--color-dark);
      color: var(--color-white);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    header {
      padding: 48px 24px 40px;
      border-bottom: 1px solid var(--color-border);
    }

    .header-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-grey);
      margin-bottom: 8px;
    }

    .header-title {
      font-size: clamp(48px, 7svw, 96px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .log-list {
      padding: 0 24px;
    }

    .log-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      border-bottom: 1px solid var(--color-border);
      text-decoration: none;
      color: inherit;
      gap: 24px;
      transition: background 0.15s ease;
    }

    .log-entry:hover .entry-date {
      color: var(--color-green);
    }

    .entry-left {
      display: flex;
      align-items: baseline;
      gap: 24px;
    }

    .entry-date {
      font-size: clamp(22px, 3svw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .entry-meals {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-grey);
    }

    .entry-right {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-shrink: 0;
    }

    .entry-macro {
      text-align: right;
    }

    .entry-macro-value {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .entry-macro-value.over { color: #ff6b6b; }
    .entry-macro-value.good { color: var(--color-green); }

    .entry-macro-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-grey);
      margin-top: 3px;
    }

    .entry-arrow {
      font-size: 20px;
      color: var(--color-grey);
      font-weight: 300;
    }

    .empty-state {
      padding: 80px 0;
      text-align: center;
      color: var(--color-grey);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .entry-right {
        gap: 16px;
      }
      .entry-macro:not(:last-of-type):not(.always-show) {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-label">CH — Nutrition Tracker</div>
    <div class="header-title">Macro<br>Log</div>
  </header>

  <div class="log-list">

    <a class="log-entry" href="20260331.html">
      <div class="entry-left">
        <div class="entry-date">31 Mar 2026</div>
        <div class="entry-meals">Breakfast · Lunch</div>
      </div>
      <div class="entry-right">
        <div class="entry-macro always-show">
          <div class="entry-macro-value good">1,424.8</div>
          <div class="entry-macro-label">kcal</div>
        </div>
        <div class="entry-macro">
          <div class="entry-macro-value">64.3g</div>
          <div class="entry-macro-label">Protein</div>
        </div>
        <div class="entry-macro">
          <div class="entry-macro-value good">55.5g</div>
          <div class="entry-macro-label">Fat</div>
        </div>
        <div class="entry-arrow">→</div>
      </div>
    </a>

    <a class="log-entry" href="20260330.html">
      <div class="entry-left">
        <div class="entry-date">30 Mar 2026</div>
        <div class="entry-meals">Breakfast · Lunch · Dinner</div>
      </div>
      <div class="entry-right">
        <div class="entry-macro always-show">
          <div class="entry-macro-value good">1,597</div>
          <div class="entry-macro-label">kcal</div>
        </div>
        <div class="entry-macro">
          <div class="entry-macro-value">83.8g</div>
          <div class="entry-macro-label">Protein</div>
        </div>
        <div class="entry-macro">
          <div class="entry-macro-value over">74.1g</div>
          <div class="entry-macro-label">Fat ⚠</div>
        </div>
        <div class="entry-arrow">→</div>
      </div>
    </a>

  </div>

</body>
</html>
