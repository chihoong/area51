<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💸 budget.exe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --green:  #00ff87;
  --pink:   #ff006e;
  --blue:   #3a86ff;
  --yellow: #f5ff00;
  --orange: #ff6b35;
  --purple: #bf5af2;
  --bg:     #080810;
  --card:   rgba(255,255,255,0.045);
  --border: rgba(255,255,255,0.08);
  --muted:  rgba(240,240,255,0.42);
  --text:   #f0f0ff;

  --tab-h:    52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── AMBIENT BG ── */
.mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%,  rgba(0,255,135,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 15%,  rgba(58,134,255,0.11) 0%, transparent 55%),
    radial-gradient(ellipse 70% 55% at 50% 90%,  rgba(255,0,110,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 70%,  rgba(191,90,242,0.08) 0%, transparent 55%);
  animation: pulse 14s ease-in-out infinite alternate;
}
@keyframes pulse { 0%{opacity:.6;transform:scale(1)} 100%{opacity:.9;transform:scale(1.04)} }

/* ── APP SHELL ── */
.app {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 0 0 calc(32px + var(--safe-bot));
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.top-bar {
  padding: calc(16px + var(--safe-top)) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.25rem; font-weight: 700;
  background: linear-gradient(135deg, var(--green), var(--blue), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -0.5px;
}
.logo sup { font-size: 0.5em; vertical-align: super; }
.period-badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; font-weight: 700;
  color: var(--yellow); letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   STICKY PERIOD TABS
══════════════════════════════════════════ */
.tabs-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs-inner { display: flex; gap: 8px; width: max-content; }
.tab {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase;
  height: 36px; padding: 0 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted); cursor: pointer;
  transition: all 0.18s; white-space: nowrap;
  display: flex; align-items: center;
}
.tab:active { transform: scale(0.95); }
.tab.active {
  background: var(--green); color: #080810;
  border-color: var(--green);
  box-shadow: 0 0 18px rgba(0,255,135,0.4);
}

/* ══════════════════════════════════════════
   HERO CARD — key info at top
══════════════════════════════════════════ */
.hero {
  margin: 16px 16px 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px; padding: 24px 22px 20px;
  backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, rgba(0,255,135,0.06) 0%, transparent 55%);
  pointer-events: none;
}
.hero-label {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
}
.hero-spent {
  font-family: 'Space Mono', monospace;
  font-size: clamp(2.4rem, 10vw, 3.2rem); font-weight: 700;
  color: var(--text); line-height: 1; margin-bottom: 4px;
  letter-spacing: -1px;
}
.hero-of {
  font-size: 0.88rem; color: var(--muted); margin-bottom: 18px;
}
.hero-of strong { color: var(--text); font-weight: 600; }

/* Master progress bar */
.hero-bar-track {
  height: 10px; border-radius: 100px;
  background: rgba(255,255,255,0.08); margin-bottom: 16px;
  overflow: hidden;
}
.hero-bar-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--blue), var(--green));
  box-shadow: 0 0 12px rgba(0,255,135,0.5);
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}
.hero-bar-fill.danger {
  background: linear-gradient(90deg, var(--orange), var(--pink));
  box-shadow: 0 0 12px rgba(255,0,110,0.5);
}

/* Hero stats row */
.hero-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
.hero-stat { text-align: center; }
.hero-stat-val {
  font-family: 'Space Mono', monospace;
  font-size: 1.05rem; font-weight: 700;
  line-height: 1.2;
}
.hero-stat-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.col-green  { color: var(--green); }
.col-pink   { color: var(--pink); }
.col-yellow { color: var(--yellow); }
.col-blue   { color: var(--blue); }
.col-purple { color: var(--purple); }
.col-orange { color: var(--orange); }

/* ══════════════════════════════════════════
   HORIZONTAL QUICK STATS SCROLLER
══════════════════════════════════════════ */
.quick-stats-wrap {
  margin: 12px 0 0; overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none; padding: 0 16px;
}
.quick-stats-wrap::-webkit-scrollbar { display: none; }
.quick-stats { display: flex; gap: 10px; width: max-content; padding: 4px 0; }
.qs-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 16px; min-width: 140px;
  backdrop-filter: blur(16px);
  position: relative; overflow: hidden;
  flex-shrink: 0;
}
.qs-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, var(--qs-accent, var(--green)) 200%);
  opacity: 0.06; pointer-events: none; border-radius: 16px;
}
.qs-icon  { font-size: 1.2rem; margin-bottom: 8px; display: block; }
.qs-val   { font-family: 'Space Mono', monospace; font-size: 1.15rem; font-weight: 700; line-height: 1; }
.qs-lbl   { font-size: 0.67rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

/* ══════════════════════════════════════════
   SECTION WRAPPER
══════════════════════════════════════════ */
.section { margin: 12px 16px 0; }
.section-title {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; padding-left: 2px;
  display: flex; align-items: center; gap: 8px;
}
.section-title .pill {
  background: rgba(255,255,255,0.07); border-radius: 100px;
  padding: 2px 9px; font-size: 0.65rem;
}

/* ══════════════════════════════════════════
   ALERT BANNER (only shows when over budget)
══════════════════════════════════════════ */
.alert-strip { display: flex; flex-direction: column; gap: 8px; }
.alert-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 13px 15px; border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid var(--alert-color, var(--green));
}
.alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.alert-text { font-size: 0.8rem; line-height: 1.45; }
.alert-text strong { color: var(--alert-color, var(--green)); font-weight: 600; }

/* ══════════════════════════════════════════
   CATEGORY LIST — mobile-native style
══════════════════════════════════════════ */
.cat-list { display: flex; flex-direction: column; gap: 2px; }
.cat-item {
  background: var(--card); border-radius: 14px;
  padding: 13px 15px; border: 1px solid transparent;
  transition: border-color 0.15s;
}
.cat-item:active { border-color: var(--border); }
.cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.cat-icon-wrap {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  background: rgba(255,255,255,0.06);
}
.cat-info { flex: 1; min-width: 0; }
.cat-name-text { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
.cat-right { text-align: right; flex-shrink: 0; }
.cat-spent-val { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; }
.cat-budget-val { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.bar-track {
  height: 4px; border-radius: 100px;
  background: rgba(255,255,255,0.07);
  overflow: visible; position: relative;
}
/* Pro-rated monthly target reference line */
.bar-ref {
  position: absolute;
  top: -5px; bottom: -5px; width: 2px;
  background: rgba(255,255,255,0.38);
  border-radius: 2px;
  left: 33.33%;
  transform: translateX(-50%);
  z-index: 2;
}
.bar-ref::before {
  content: attr(data-label);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: rgba(240,240,255,0.45);
  white-space: nowrap;
  pointer-events: none;
}
.bar-ref.over-target { background: rgba(255,0,110,0.55); }
.bar-ref.under-target { background: rgba(0,255,135,0.45); }
.bar-fill {
  height: 100%; border-radius: 100px;
  background: var(--bc, var(--green));
  box-shadow: 0 0 6px var(--bc, var(--green));
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
}
.bar-fill.over {
  background: var(--pink); box-shadow: 0 0 8px var(--pink);
  animation: blink 1.4s ease-in-out infinite alternate;
}
@keyframes blink { from{opacity:1} to{opacity:0.55} }

/* ══════════════════════════════════════════
   MONTHLY TREND
══════════════════════════════════════════ */
.trend-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px 18px;
  backdrop-filter: blur(16px);
}
.trend-bars { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; height: 90px; align-items: flex-end; }
.trend-col { display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; justify-content: flex-end; }
.t-bar {
  width: 100%; border-radius: 6px 6px 0 0;
  background: linear-gradient(180deg, rgba(58,134,255,0.5), rgba(58,134,255,0.18));
  transition: height 0.8s cubic-bezier(0.4,0,0.2,1), background 0.25s, box-shadow 0.25s;
}
.t-bar.hi { background: linear-gradient(180deg, var(--green), rgba(0,255,135,0.35)); box-shadow: 0 0 14px rgba(0,255,135,0.45); }
.t-bar.dim { opacity: 0.3; }
.t-amt { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.trend-labels { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 8px; }
.t-lbl { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.64rem; color: var(--muted); transition: color 0.2s; }
.t-lbl.hi { color: var(--green); font-weight: 700; }

/* ══════════════════════════════════════════
   TABLE (mobile: simplified; desktop: full)
══════════════════════════════════════════ */
.table-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; overflow: hidden;
  backdrop-filter: blur(16px);
}
.tbl { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
.tbl thead th {
  padding: 10px 12px; text-align: right;
  font-size: 0.67rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.tbl thead th:first-child { text-align: left; }
.tbl thead th.hi { color: var(--green); }
.tbl tbody tr { border-top: 1px solid rgba(255,255,255,0.05); }
.tbl tbody tr:active { background: rgba(255,255,255,0.03); }
.tbl tbody td { padding: 10px 12px; text-align: right; font-family: 'Space Mono', monospace; font-size: 0.79rem; }
.tbl tbody td:first-child { text-align: left; font-family: 'Space Grotesk', sans-serif; }
.tbl tbody td.hi { font-weight: 700; color: var(--text); }
.tbl tfoot td {
  padding: 11px 12px; text-align: right;
  font-family: 'Space Mono', monospace; font-size: 0.81rem; font-weight: 700;
  border-top: 1px solid rgba(255,255,255,0.14);
}
.tbl tfoot td:first-child { text-align: left; font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.tbl tfoot td.hi { color: var(--yellow); }
.dim { color: var(--muted); }
/* Hide Jan/Feb/Mar columns on mobile; show only selected + Q1 + budget + diff */
.col-jan, .col-feb, .col-mar { display: none; }
@media (min-width: 560px) { .col-jan, .col-feb, .col-mar { display: table-cell; } }
.cat-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.84rem; font-weight: 500; }
.note-tag { font-size: 0.67rem; color: var(--muted); display: none; }
@media (min-width: 560px) { .note-tag { display: inline; } }

/* ══════════════════════════════════════════
   DONUT — hidden on mobile, visible ≥560px
══════════════════════════════════════════ */
.donut-section { display: none; }
@media (min-width: 560px) { .donut-section { display: block; } }
.donut-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 22px;
  backdrop-filter: blur(16px);
}
.donut-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 18px; }
.donut-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); text-align: center; pointer-events: none;
}
.donut-big   { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; color: var(--green); line-height: 1; }
.donut-small { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }
.legend-list { display: flex; flex-direction: column; gap: 8px; }
.leg-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
.leg-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
.leg-label { flex: 1; }
.leg-pct { font-family: 'Space Mono', monospace; font-size: 0.74rem; color: var(--muted); }
.leg-amt { font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 600; }

/* ══════════════════════════════════════════
   DESKTOP ADJUSTMENTS ≥ 560px
══════════════════════════════════════════ */
@media (min-width: 560px) {
  .app { padding: 0 0 60px; }
  .hero { margin: 20px 20px 0; }
  .section { margin: 14px 20px 0; }
  .quick-stats-wrap { padding: 0 20px; }
  .hero-spent { font-size: 3rem; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
}
@media (min-width: 700px) {
  .app { padding: 0 0 80px; }
  .top-bar { padding: calc(24px + var(--safe-top)) 28px 16px; }
  .hero, .section { margin-inline: 24px; }
  .quick-stats-wrap { padding: 0 24px; }
}

/* ── ANIMATIONS ── */
.fade-in { animation: fi 0.5s ease both; }
@keyframes fi { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="mesh"></div>

<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar fade-in">
    <div class="logo">budget<sup>.exe</sup></div>
    <div class="period-badge" id="periodBadge">Q1 2026</div>
  </div>

  <!-- STICKY TABS -->
  <div class="tabs-wrap">
    <div class="tabs-inner">
      <button class="tab"        data-p="jan"  onclick="update('jan')">January</button>
      <button class="tab"        data-p="feb"  onclick="update('feb')">February</button>
      <button class="tab active" data-p="mar"  onclick="update('mar')">March</button>
    </div>
  </div>

  <!-- HERO CARD -->
  <div class="hero fade-in">
    <div class="hero-label" id="heroLabel">Q1 2026 total spent</div>
    <div class="hero-spent" id="heroSpent">—</div>
    <div class="hero-of" id="heroOf">of <strong>—</strong> budgeted</div>
    <div class="hero-bar-track">
      <div class="hero-bar-fill" id="heroBar"></div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-val col-green" id="hs-remaining">—</div>
        <div class="hero-stat-lbl">remaining</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val col-yellow" id="hs-pct">—</div>
        <div class="hero-stat-lbl">of budget</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val col-pink" id="hs-over">—</div>
        <div class="hero-stat-lbl">over budget</div>
      </div>
    </div>
  </div>

  <!-- QUICK STATS SCROLL -->
  <div class="quick-stats-wrap">
    <div class="quick-stats" id="quickStats"></div>
  </div>

  <!-- ALERTS -->
  <div class="section" id="alertSection" style="display:none;">
    <div class="section-title">budget alerts <span class="pill" id="alertPill">q1</span></div>
    <div class="alert-strip" id="alertList"></div>
  </div>

  <!-- CATEGORY LIST -->
  <div class="section">
    <div class="section-title">categories <span class="pill" id="catPill">q1 vs budget</span></div>
    <div class="cat-list" id="catList"></div>
  </div>

  <!-- MONTHLY TREND + DONUT (side by side on desktop) -->
  <div class="section two-col-wrap">
    <!-- trend -->
    <div class="trend-card" style="margin-bottom:12px;" id="trendCard">
      <div class="section-title" style="margin-bottom:14px;">monthly spend <span class="pill">jan – mar</span></div>
      <div class="trend-bars" id="trendBars"></div>
      <div class="trend-labels" id="trendLabels"></div>
    </div>
    <!-- donut (desktop only) -->
    <div class="donut-section">
      <div class="donut-card">
        <div class="section-title" style="margin-bottom:14px;">breakdown <span class="pill" id="donutPill">q1</span></div>
        <div class="donut-wrap">
          <canvas id="donutChart" width="180" height="180"></canvas>
          <div class="donut-center">
            <div class="donut-big" id="donutPct">—</div>
            <div class="donut-small">of budget</div>
          </div>
        </div>
        <div class="legend-list" id="donutLegend"></div>
      </div>
    </div>
  </div>

  <!-- QUARTERLY TABLE -->
  <div class="section">
    <div class="section-title">monthly breakdown <span class="pill">jan – mar 2026</span></div>
    <div class="table-card">
      <table class="tbl">
        <thead id="tblHead"></thead>
        <tbody id="tblBody"></tbody>
        <tfoot id="tblFoot"></tfoot>
      </table>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const D = [
  { cat:'Dining Out',     icon:'🍽️', color:'#ff006e', jan: 283, feb: 458, mar:  346, budget: 2125 },
  { cat:'Discretionary',  icon:'🛍️', color:'#bf5af2', jan:  48, feb:1000, mar:  957, budget: 1875 },
  { cat:'Dog',            icon:'🐕', color:'#f5ff00', jan:4534, feb: 866, mar:  990, budget: 2750, note:'Jan: teeth cleaning' },
  { cat:'Drinks',         icon:'🍸', color:'#ff6b35', jan:   0, feb: 160, mar:   70, budget:  250 },
  { cat:'Fitness',        icon:'🏋️', color:'#00ff87', jan:   0, feb:  20, mar:   20, budget:  625 },
  { cat:'Groceries',      icon:'🛒', color:'#3a86ff', jan: 676, feb: 898, mar: 1007, budget: 2750 },
  { cat:'Health',         icon:'💊', color:'#06d6a0', jan:  87, feb: 228, mar:   37, budget:  625 },
  { cat:'Household',      icon:'🏠', color:'#ff9f1c', jan: 211, feb: 192, mar:   71, budget:  875 },
  { cat:'Insurance',      icon:'🛡️', color:'#ff4444', jan: 568, feb: 541, mar: 2498, budget: 2250 },
  { cat:'Transportation', icon:'🚗', color:'#48cae4', jan:  99, feb:  30, mar:   70, budget:  500 },
  { cat:'Travel',         icon:'✈️', color:'#a8dadc', jan: 995, feb:   0, mar:    0, budget: 3750 },
  { cat:'Utilities',      icon:'⚡', color:'#e9c46a', jan: 183, feb: 314, mar:   95, budget:  625 },
  { cat:'Woodworking',    icon:'🪚', color:'#84a98c', jan: 275, feb:   0, mar:    0, budget:  250 },
  { cat:'Bank Fees',      icon:'🏦', color:'#8ecae6', jan:   0, feb:   0, mar:    0, budget:   75 },
  { cat:'Prof. Fees',     icon:'👔', color:'#9b8ea8', jan:   0, feb:   0, mar:    0, budget:  125 },
];
const MTH = { jan:7959, feb:4707, mar:6161 };
const LABELS = { ytd:'Q1 2026', jan:'January 2026', feb:'February 2026', mar:'March 2026' };

/* ── helpers ── */
const $   = id => document.getElementById(id);
const fmt = n  => '$' + Math.abs(Math.round(n)).toLocaleString();
const fmtC= n  => n > 0 ? '$' + n.toLocaleString() : '<span class="dim">—</span>';

function spend(d, p) {
  return p==='jan'?d.jan : p==='feb'?d.feb : p==='mar'?d.mar : d.jan+d.feb+d.mar;
}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
function buildHero(p) {
  const active = D.filter(d => d.budget > 0);
  const tot  = active.reduce((s,d) => s+spend(d,p), 0);
  const bud  = active.reduce((s,d) => s+d.budget,   0);
  const rem  = bud - tot;
  const pct  = (tot/bud*100).toFixed(1);
  const over = active.filter(d => spend(d,p) > d.budget && d.budget > 0).length;
  const isOver = tot > bud;

  const monthlyTarget = Math.round(bud / 3);
  const isMonthly     = p !== 'ytd';

  $('periodBadge').textContent = LABELS[p].toUpperCase();
  $('heroLabel').textContent   = (isMonthly ? LABELS[p] : 'Q1 2026') + ' total spent';
  $('heroSpent').textContent   = fmt(tot);
  $('heroOf').innerHTML        = isMonthly
    ? `of <strong>${fmt(monthlyTarget)}</strong> monthly target <span style="color:var(--muted);font-size:0.8em;">(${fmt(bud)} Q1 budget)</span>`
    : `of <strong>${fmt(bud)}</strong> Q1 budget`;

  // Hero bar: for monthly view, fill vs monthly target (not full Q1 budget)
  const barPct  = isMonthly ? (tot / monthlyTarget * 100) : parseFloat(pct);
  const barOver = isMonthly ? (tot > monthlyTarget) : isOver;

  const bar = $('heroBar');
  bar.classList.toggle('danger', barOver);
  setTimeout(() => { bar.style.width = Math.min(barPct, 100) + '%'; }, 50);

  // For monthly view, stats reference monthly target; for YTD, reference Q1 budget
  const displayRem  = isMonthly ? (monthlyTarget - tot) : rem;
  const displayPct  = isMonthly ? (tot / monthlyTarget * 100).toFixed(1) : pct;
  const overTarget  = isMonthly
    ? active.filter(d => spend(d,p) > Math.round(d.budget/3)).length
    : over;

  $('hs-remaining').textContent = (displayRem < 0 ? '-' : '') + fmt(displayRem);
  $('hs-remaining').className   = 'hero-stat-val ' + (displayRem < 0 ? 'col-pink' : 'col-green');
  $('hs-pct').textContent       = displayPct + '%';
  $('hs-over').textContent      = overTarget + (overTarget===1?' cat':' cats');
  $('hs-over').className        = 'hero-stat-val ' + (overTarget > 0 ? 'col-pink' : 'col-green');
}

/* ══════════════════════════════════════════
   QUICK STATS
══════════════════════════════════════════ */
function buildQuick(p) {
  const el = $('quickStats');
  el.innerHTML = '';

  const active  = D.filter(d => d.budget > 0);
  const sorted  = [...active].sort((a,b) => spend(b,p)-spend(a,p));
  const topCat  = sorted[0];
  const overCat = active.filter(d => spend(d,p) > d.budget && d.budget > 0).length;
  const zeroCat = active.filter(d => spend(d,p) === 0).length;
  const bigMth  = p==='ytd' ? Object.entries(MTH).sort((a,b)=>b[1]-a[1])[0] : null;

  const cards = [
    { icon: topCat.icon,  val: fmt(spend(topCat,p)),  lbl: 'top: '+topCat.cat.toLowerCase(), accent:'#f5ff00' },
    { icon: '⚠️',          val: overCat,               lbl: 'over budget',                    accent:'#ff006e' },
    { icon: '💤',          val: zeroCat,               lbl: 'zero spend',                     accent:'#bf5af2' },
    ...(bigMth ? [{ icon:'📅', val: fmt(bigMth[1]), lbl: 'high: '+bigMth[0].toUpperCase(), accent:'#ff6b35' }] : []),
    { icon: '📊', val: D.filter(d=>d.budget>0 && spend(d,p)>0).length, lbl: 'active cats', accent:'#3a86ff' },
  ];

  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'qs-card';
    card.style.setProperty('--qs-accent', c.accent);
    card.innerHTML = `
      <span class="qs-icon">${c.icon}</span>
      <div class="qs-val" style="color:${c.accent}">${c.val}</div>
      <div class="qs-lbl">${c.lbl}</div>
    `;
    el.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   ALERTS
══════════════════════════════════════════ */
function buildAlerts(p) {
  const sec  = $('alertSection');
  const list = $('alertList');
  list.innerHTML = '';
  $('alertPill').textContent = p==='ytd'?'q1':p.toUpperCase();

  const active   = D.filter(d => d.budget > 0);
  const overCats = active.filter(d => spend(d,p) > d.budget)
    .sort((a,b)=>(spend(b,p)/b.budget)-(spend(a,p)/a.budget));

  if (!overCats.length) { sec.style.display='none'; return; }
  sec.style.display = '';

  overCats.forEach(d => {
    const sp  = spend(d, p);
    const pct = Math.round(sp/d.budget*100);
    const ovr = sp - d.budget;
    let txt = `<strong>${d.cat}</strong> — ${pct}% of budget. Spent $${sp.toLocaleString()} vs $${d.budget.toLocaleString()} (over by $${ovr.toLocaleString()}).`;
    if (d.note && p==='jan') txt += ` ${d.note}.`;
    const item = document.createElement('div');
    item.className = 'alert-item';
    item.style.setProperty('--alert-color', pct>150?'#ff4444':'#f5ff00');
    item.innerHTML = `<div class="alert-icon">${pct>150?'🔴':'🟡'}</div><div class="alert-text">${txt}</div>`;
    list.appendChild(item);
  });

  // Insurance Mar callout
  if (p==='mar') {
    const item = document.createElement('div');
    item.className = 'alert-item';
    item.style.setProperty('--alert-color', '#ff6b35');
    item.innerHTML = `<div class="alert-icon">⚠️</div><div class="alert-text"><strong>Insurance</strong> — March ($2,498) is 4× the Jan/Feb baseline (~$555). Verify if this recurs.</div>`;
    list.appendChild(item);
  }
}

/* ══════════════════════════════════════════
   CATEGORY LIST
══════════════════════════════════════════ */
function buildCats(p) {
  const list = $('catList');
  list.innerHTML = '';
  $('catPill').textContent = p==='ytd'?'q1 vs budget':p.toUpperCase()+' vs monthly target';

  const isMonthly = p !== 'ytd';
  const active = D.filter(d => d.budget > 0)
    .sort((a,b) => (spend(b,p)/b.budget)-(spend(a,p)/a.budget));

  active.forEach(d => {
    const sp      = spend(d,p);
    const bud     = d.budget;
    const target  = Math.round(bud / 3);          // pro-rated monthly target
    const pct     = Math.min(sp/bud*100, 100);    // fill % vs Q1 budget
    const overBud = sp > bud;                      // over full Q1 budget
    const overTgt = isMonthly && sp > target;      // over monthly target

    // Sub-label: show target context in monthly view
    const subText = isMonthly
      ? `${fmt(target)}/mo target · ${(sp/bud*100).toFixed(0)}% of Q1 budget`
      : `${(sp/bud*100).toFixed(0)}% of $${bud.toLocaleString()} Q1 budget`;

    // Right-side callout
    let rightDetail;
    if (isMonthly) {
      const diff = sp - target;
      rightDetail = diff > 0
        ? `<span style="color:var(--orange)">↑ $${diff.toLocaleString()} over target</span>`
        : `<span style="color:var(--green)">$${Math.abs(diff).toLocaleString()} under target</span>`;
    } else {
      rightDetail = overBud
        ? `<span style="color:var(--pink)">over by $${(sp-bud).toLocaleString()}</span>`
        : `$${(bud-sp).toLocaleString()} left`;
    }

    // Reference line HTML (single month only)
    const refLine = isMonthly
      ? `<div class="bar-ref ${overTgt?'over-target':'under-target'}" data-label="${fmt(target)}/mo"></div>`
      : '';

    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-row">
        <div class="cat-icon-wrap">${d.icon}</div>
        <div class="cat-info">
          <div class="cat-name-text">${d.cat}</div>
          <div class="cat-sub">${subText}</div>
        </div>
        <div class="cat-right">
          <div class="cat-spent-val" style="color:${overBud?'var(--pink)':overTgt?'var(--orange)':d.color}">${sp>0?fmt(sp):'—'}</div>
          <div class="cat-budget-val">${rightDetail}</div>
        </div>
      </div>
      <div class="bar-track">
        ${refLine}
        <div class="bar-fill ${overBud?'over':''}" style="--bc:${d.color};width:0%" data-t="${pct}"></div>
      </div>
    `;
    list.appendChild(item);
  });

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.t + '%'; });
  }, 60);
}

/* ══════════════════════════════════════════
   TREND
══════════════════════════════════════════ */
let trendBuilt = false;
function buildTrend(p) {
  const bEl = $('trendBars');
  const lEl = $('trendLabels');

  if (!trendBuilt) {
    const mths = [
      {key:'jan',lbl:'JAN',amt:MTH.jan},
      {key:'feb',lbl:'FEB',amt:MTH.feb},
      {key:'mar',lbl:'MAR',amt:MTH.mar},
    ];
    const max = Math.max(...mths.map(m=>m.amt));
    mths.forEach(m => {
      const hp = (m.amt/max*100);
      const col = document.createElement('div');
      col.className = 'trend-col';
      col.dataset.key = m.key;
      col.innerHTML = `<div class="t-amt">$${(m.amt/1000).toFixed(1)}k</div><div class="t-bar" id="tb-${m.key}" style="height:0%" data-h="${hp}"></div>`;
      bEl.appendChild(col);

      const lbl = document.createElement('div');
      lbl.className = 't-lbl';
      lbl.id = 'tl-'+m.key;
      lbl.textContent = m.lbl;
      lEl.appendChild(lbl);
    });
    trendBuilt = true;
    setTimeout(()=>{ ['jan','feb','mar'].forEach(k=>{ const b=$('tb-'+k); if(b) b.style.height=b.dataset.h+'%'; }); }, 100);
  }

  ['jan','feb','mar'].forEach(k => {
    const bar = $('tb-'+k);
    const lbl = $('tl-'+k);
    if (!bar) return;
    const sel = p===k, ytd = p==='ytd';
    bar.classList.toggle('hi', sel || ytd);
    bar.classList.toggle('dim', !sel && !ytd);
    lbl.classList.toggle('hi', sel);
  });
}

/* ══════════════════════════════════════════
   DONUT (desktop only)
══════════════════════════════════════════ */
function buildDonut(p) {
  const canvas = $('donutChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,180,180);

  const cx=90, cy=90, r=72, inn=48;
  const active = D.filter(d=>spend(d,p)>0);
  const tot    = active.reduce((s,d)=>s+spend(d,p),0);
  const bud    = D.filter(d=>d.budget>0).reduce((s,d)=>s+d.budget,0);
  const pct    = (tot/bud*100).toFixed(1);

  $('donutPct').textContent   = pct+'%';
  $('donutPill').textContent  = p==='ytd'?'q1 by cat':p.toUpperCase()+' by cat';

  let ang = -Math.PI/2;
  active.forEach(d => {
    const sl = spend(d,p)/tot*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,ang,ang+sl); ctx.closePath();
    ctx.fillStyle = d.color; ctx.fill();
    ang += sl;
  });
  ang = -Math.PI/2;
  active.forEach(d => {
    const sl = spend(d,p)/tot*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(ang), cy+r*Math.sin(ang));
    ctx.strokeStyle='#080810'; ctx.lineWidth=2; ctx.stroke();
    ang+=sl;
  });
  ctx.beginPath(); ctx.arc(cx,cy,inn,0,2*Math.PI);
  ctx.fillStyle='#080810'; ctx.fill();

  const leg = $('donutLegend');
  leg.innerHTML='';
  [...active].sort((a,b)=>spend(b,p)-spend(a,p)).slice(0,7).forEach(d => {
    const sp  = spend(d,p);
    const pct = (sp/tot*100).toFixed(1);
    const it  = document.createElement('div');
    it.className='leg-item';
    it.innerHTML=`<div class="leg-dot" style="background:${d.color}"></div><span class="leg-label">${d.icon} ${d.cat}</span><span class="leg-pct">${pct}%</span><span class="leg-amt" style="color:${d.color}">$${sp.toLocaleString()}</span>`;
    leg.appendChild(it);
  });
}

/* ══════════════════════════════════════════
   TABLE
══════════════════════════════════════════ */
function buildTable(p) {
  const hi = col => p===col||p==='ytd' ? 'hi' : '';

  $('tblHead').innerHTML = `<tr>
    <th>Category</th>
    <th class="col-jan ${hi('jan')}">Jan</th>
    <th class="col-feb ${hi('feb')}">Feb</th>
    <th class="col-mar ${hi('mar')}">Mar</th>
    <th class="${p==='ytd'?'hi':''}">Q1</th>
    <th>Budget</th>
    <th>Δ</th>
  </tr>`;

  const body = $('tblBody');
  body.innerHTML = '';
  let jT=0, fT=0, mT=0, bT=0;

  D.forEach(d => {
    const q1 = d.jan+d.feb+d.mar;
    if (d.budget===0 && q1===0) return;

    const sp   = spend(d, p);
    const diff = sp - d.budget;
    const over = diff>0 && d.budget>0;
    const dStr = d.budget===0
      ? '<span class="dim">—</span>'
      : over
        ? `<span style="color:#ff4444;font-weight:600;">+$${diff.toLocaleString()}</span>`
        : `<span style="color:#00ff87;">-$${Math.abs(diff).toLocaleString()}</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="cat-tag"><span>${d.icon}</span><span style="color:${d.color};font-weight:500;">${d.cat}</span>${d.note?`<span class="note-tag">(${d.note})</span>`:''}</span></td>
      <td class="col-jan ${hi('jan')}">${fmtC(d.jan)}</td>
      <td class="col-feb ${hi('feb')}">${fmtC(d.feb)}</td>
      <td class="col-mar ${hi('mar')}">${fmtC(d.mar)}</td>
      <td class="${p==='ytd'?'hi':''}" style="font-weight:700;">${q1>0?'$'+q1.toLocaleString():'<span class="dim">—</span>'}</td>
      <td class="dim">${d.budget>0?'$'+d.budget.toLocaleString():'<span class="dim">—</span>'}</td>
      <td>${dStr}</td>`;
    body.appendChild(tr);

    jT+=d.jan; fT+=d.feb; mT+=d.mar; bT+=d.budget;
  });

  const q1G  = jT+fT+mT;
  const spG  = p==='jan'?jT : p==='feb'?fT : p==='mar'?mT : q1G;
  const dG   = spG - bT;
  const dStr = dG>0
    ? `<span style="color:#ff4444;font-weight:700;">+$${dG.toLocaleString()}</span>`
    : `<span style="color:#00ff87;font-weight:700;">-$${Math.abs(dG).toLocaleString()}</span>`;

  $('tblFoot').innerHTML = `<tr>
    <td>Total</td>
    <td class="col-jan ${hi('jan')}">${'$'+jT.toLocaleString()}</td>
    <td class="col-feb ${hi('feb')}">${'$'+fT.toLocaleString()}</td>
    <td class="col-mar ${hi('mar')}">${'$'+mT.toLocaleString()}</td>
    <td class="${p==='ytd'?'hi':''}" style="color:var(--yellow);">$${q1G.toLocaleString()}</td>
    <td class="dim">$${bT.toLocaleString()}</td>
    <td>${dStr}</td>
  </tr>`;
}

/* ══════════════════════════════════════════
   DESKTOP TWO-COL LAYOUT INJECTION
══════════════════════════════════════════ */
function setupLayout() {
  // Wrap trend + donut in a two-col div on desktop
  const section = document.querySelector('.two-col-wrap');
  if (window.innerWidth >= 560) {
    const tCard = $('trendCard');
    const dSec  = document.querySelector('.donut-section');
    if (tCard && dSec && !section.classList.contains('two-col')) {
      section.classList.add('two-col');
      section.innerHTML = '';
      section.appendChild(tCard);
      section.appendChild(dSec);
    }
  }
}

/* ══════════════════════════════════════════
   ORCHESTRATOR
══════════════════════════════════════════ */
function update(p) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.p===p));
  buildHero(p);
  buildQuick(p);
  buildAlerts(p);
  buildCats(p);
  buildTrend(p);
  buildDonut(p);
  buildTable(p);
}

window.addEventListener('resize', setupLayout);
setupLayout();
update('mar');
</script>
</body>
</html>
